aid: carrier-global
name: Carrier Global
description: >-
  Carrier Global Corporation is a global provider of healthy, safe, sustainable,
  and intelligent building and cold-chain solutions, spanning HVAC, refrigeration,
  fire, security, and building automation technologies. Its digital ecosystem
  includes the Lynx Fleet telematics platform (Lynx APIs for transport
  refrigeration units), the Abound building management platform, i-Vu and
  Carrier Comfort Network for commercial building automation, and the Carrier
  SmartHome app for residential smart thermostats.
type: Index
position: Provider
access: Partner
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - HVAC
  - Cold Chain
  - Telematics
  - Building Automation
  - IoT
  - Refrigeration
  - Fortune 500
created: '2026-03-21'
modified: '2026-04-23'
url: >-
