specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Carrier Global
providerId: carrier-global
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - HVAC
  - IoT
  - Telematics
  - Building Automation
  - Rate Limiting
description: Carrier Global does not publish public per-second or per-minute rate limits for the Lynx
  Fleet, Abound, i-Vu, or Carrier Comfort Network APIs. Limits are configured per customer credential
  and dimensioned by tracked-asset count rather than raw request rate.
notes: No public rate-limit documentation found on the Lynx, Abound, or i-Vu doc portals. Treat as customer-contract-defined.
sources:
  - https://doc-api.fleet.lynx.carrier.io/
  - https://www.corporate.carrier.com/
responseCodes:
  throttled: 429
limits:
  - name: Lynx Fleet (per-customer)
    scope: customer
    metric: varies
    limit: see Lynx Fleet onboarding
  - name: Abound (per-tenant)
    scope: tenant
    metric: varies
    limit: see Abound onboarding
  - name: i-Vu / Comfort Network
    scope: site
    metric: varies
    limit: see installer documentation
policies:
  - name: Asset-scoped polling
    description: Lynx Fleet APIs reward periodic polling per-asset rather than burst reads; align polling
      to the documented telemetry cadence.
  - name: Backoff strategy
    description: Implement exponential backoff with jitter on 429 responses; coordinate batch operations
      with the Carrier technical contact.
  - name: Two-way command safety
    description: Two-way refrigeration commands have stricter throttling and require idempotency safeguards
      to avoid double-actuation on retried requests.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
